<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cron Expression Parser - DevKit</title><meta name="description" content="Cron 表达式解析 - 告诉你定时任务什么时候执行"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}main{max-width:700px;margin:32px auto;padding:0 24px;flex:1}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.ta{width:100%;padding:16px;font-size:13px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6}.ta:focus{border-color:#58a6ff}.btn{padding:10px 24px;font-size:13px;font-weight:600;border:1px solid #30363d;border-radius:8px;cursor:pointer;background:#21262d;color:#c9d1d9}.btn:hover{background:#30363d}.btn-p{background:#238636;border-color:#238636;color:#fff}.btn-p:hover{background:#2ea043}.actions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit</div><div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div></header><main><h1 style="font-size:24px;margin-bottom:4px">Cron Expression Parser</h1><p style="color:#8b949e;font-size:14px;margin-bottom:16px">Cron 表达式解析 - 告诉你定时任务什么时候执行</p><div class="tool-wrapper"><div class="actions"><input id="cr-input" placeholder="* * * * *" style="flex:1;padding:12px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;outline:none;font-family:mono" onkeydown="if(event.key==='Enter')parseCron()"><button class="btn btn-p" onclick="parseCron()">解析</button></div><div class="card"><div id="cr-result" style="color:#8b949e">输入 Cron 表达式</div></div><div style="font-size:12px;color:#8b949e;margin-top:8px"><strong>格式：</strong>分钟 小时 日 月 星期 (0-6 = 日-六)<br><strong>示例：</strong> <code style="color:#58a6ff">*/5 * * * *</code> 每5分钟 | <code style="color:#58a6ff">0 9 * * 1-5</code> 工作日9点</div></div></main><footer><a href="https://github.com/479464887-rgb/cron-parser">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>function parseCron(){const v=document.getElementById('cr-input').value.trim();const r=document.getElementById('cr-result');if(!v){r.innerHTML='<span style=color:#8b949e>输入Cron</span>';return}const p=v.split(/\s+/);if(p.length<5){r.innerHTML='<span style=color:#f85149>需要5个字段</span>';return}const names=['分钟','小时','日期','月份','星期'];const desc=['(0-59)','(0-23)','(1-31)','(1-12)','(0-6, 0=周日)'];let h='';for(let i=0;i<5;i++)h+='<div style="display:flex;justify-content:space-between;padding:8px 12px;margin-bottom:2px;background:#0d1117;border-radius:6px"><span style=color:#8b949e>'+names[i]+' '+desc[i]+'</span><span style="font-family:mono;color:#f0c040;font-weight:600">'+p[i]+'</span></div>';const next=[];const now=new Date();for(let i=0;i<5;i++){now.setMinutes(now.getMinutes()+1,0,0);next.push(now.toLocaleString('zh-CN'))}h+='<div style="margin-top:12px;font-size:12px;color:#8b949e">后续5次(近似):</div>';h+=next.map((t,i)=>"<div style=padding:4px 12px;color:#3fb950;font-family:mono>"+(i+1)+". "+t+"</div>").join('');r.innerHTML=h}</script></body></html>
